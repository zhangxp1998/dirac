<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Light sans-serif font for the modern startup aesthetic -->
  <text x="12" y="15.5" text-anchor="middle" font-size="15" font-weight="300"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-style="italic" fill="currentColor">δ</text>
        
  <!-- Clean, geometric baseline -->
  <line x1="2" y1="21" x2="22" y2="21" stroke="currentColor" stroke-opacity="0.4"
        stroke-width="1.2" stroke-linecap="round"/>
        
  <!-- Modern vertical cursor -->
  <line x1="12" y1="21" x2="12" y2="18" stroke="currentColor"
        stroke-width="1.2" stroke-linecap="round"/>
        
  <!-- Sharp geometric dot -->
  <circle cx="12" cy="17.2" r="1" fill="currentColor"/>
</svg>
